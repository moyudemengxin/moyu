<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道途 · 问心</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #f5efe6;
            color: #2e241b;
        }
        h1 {
            text-align: center;
            font-weight: 400;
            letter-spacing: 6px;
            border-bottom: 1px solid #b9a28c;
            padding-bottom: 15px;
        }
        .sub {
            text-align: center;
            font-style: italic;
            color: #6b5843;
            margin-bottom: 30px;
        }
        .page-indicator {
            text-align: center;
            margin: 20px 0 10px;
            font-size: 1rem;
            color: #7a624b;
        }
        .question-item {
            background: #fffbf5;
            border-radius: 20px;
            padding: 18px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border: 1px solid #e7dbcd;
        }
        .q-title {
            font-weight: 600;
            margin-bottom: 14px;
            font-size: 1.05rem;
        }
        .option-label {
            display: block;
            padding: 8px 12px;
            margin: 6px 0;
            border-radius: 40px;
            background: #fcf9f5;
            border: 1px solid #ddd0c0;
            cursor: pointer;
            transition: all 0.1s;
        }
        .option-label:hover {
            background: #efe3d6;
        }
        .option-label input {
            margin-right: 10px;
            accent-color: #8b6f50;
        }
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
        }
        .primary-btn {
            background: #6b4e2e;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 60px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            transition: 0.2s;
            border: 1px solid #8b6f50;
            min-width: 120px;
        }
        .primary-btn:disabled {
            background: #b9a28c;
            cursor: not-allowed;
            box-shadow: none;
        }
        .primary-btn:hover:not(:disabled) {
            background: #4f3a22;
            transform: scale(0.98);
        }
        .hidden {
            display: none !important;
        }
        /* 结果区域 */
        .result-area {
            background: #e7dbcd;
            border-radius: 32px;
            padding: 25px 20px;
            margin-top: 30px;
            box-shadow: inset 0 0 0 1px #f3ede6, 0 10px 20px rgba(0,0,0,0.05);
        }
        .result-text {
            text-align: center;
        }
        .dao-name {
            font-size: 3rem;
            font-weight: 500;
            letter-spacing: 8px;
            color: #2b1b0e;
            margin-bottom: 5px;
        }
        .sub-dao {
            font-size: 1.4rem;
            color: #5f4a32;
            margin-bottom: 20px;
            font-weight: 400;
            border-bottom: 1px dashed #b9a28c;
            padding-bottom: 15px;
        }
        .radar-container {
            margin: 20px auto;
            width: 100%;
            max-width: 500px;
            height: auto;
        }
        canvas {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            background: #f1e8de;
            border-radius: 30px;
            padding: 8px;
        }
        /* 保持原有的外层容器样式不变 */
        .dao-desc-item {
            text-align: left;
            margin: 15px 0;
            padding: 14px 20px;
            background: #f3ede6;
            border-radius: 20px;
            line-height: 1.6;
        }

        /* 新增：八字真言行的样式 */
        .dao-quote-title {
            font-size: 1.05rem; /* 稍微大一点，突出重点 */
            color: #3e2e1f;
            margin-bottom: 6px; /* 换行并向下留出间距 */
            font-weight: 500;
        }

        /* 强化道名加粗效果 */
        .dao-quote-title strong {
            color: #6b4e2e;
            font-size: 1.15rem;
            margin-right: 4px;
        }

        /* 新增：小字解释文本的样式 */
        .dao-desc-text {
            font-size: 0.9rem; /* 设置为小字 */
            color: #7a624b; /* 颜色调浅一点，拉开层次感 */
            text-align: justify; /* 两端对齐，看起来更整齐 */
        }
        .glitch-box {
            font-family: monospace;
            background: #1e1a16;
            color: #b3ffaa;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 4px;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #8f7a64;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <h1>· 道 途 问 心 ·</h1>
    <div class="sub">五十六问 · 照见本真</div>

    <!-- 分页容器 -->
    <div id="pages-container"></div>
    <div class="page-indicator" id="page-indicator"></div>

    <div class="btn-container">
        <button class="primary-btn" id="prev-btn" disabled>上一页</button>
        <button class="primary-btn" id="next-btn">下一页</button>
        <button class="primary-btn hidden" id="submit-btn">叩问道心</button>
    </div>

    <div id="result-area" class="result-area hidden">
        <div id="result-content"></div>
    </div>

    <footer>
       ©莹栀满悦 摸鱼 
    </footer>

    <script src="index.js"></script>
</body>
</html>
