<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你到底修什么仙？</title>
    <style>
       footer {
            text-align: center;
            margin-top: 50px; /* 增加与上方结果区域的距离 */
            padding-bottom: 30px;
            color: #8f7a64;
        }

        /* 创作者名字的样式 */
        .footer-copyright {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 8px; /* 给下方留出一点点空隙 */
            letter-spacing: 1px;
        }

        /* 温馨提示的样式 */
        .footer-disclaimer {
            font-size: 0.75rem; /* 字号比名字稍微小一点点，更有主次感 */
            color: #a38d78;
            letter-spacing: 2px; /* 拉开字间距 */
            /* 注意：这里已经把之前那个 padding-right 删掉了，让它恢复绝对居中 */
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #f5efe6;
            color: #2e241b;
        }
        h1 {
            text-align: center;
            font-weight: 400;
            letter-spacing: 6px;
            border-bottom: 1px solid #b9a28c;
            padding-bottom: 15px;
        }
        .sub {
            text-align: center;
            font-style: italic;
            color: #6b5843;
            margin-bottom: 30px;
        }
        .page-indicator {
            text-align: center;
            margin: 20px 0 10px;
            font-size: 1rem;
            color: #7a624b;
        }
        .question-item {
            background: #fffbf5;
            border-radius: 20px;
            padding: 18px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border: 1px solid #e7dbcd;
        }
        .q-title {
            font-weight: 600;
            margin-bottom: 14px;
            font-size: 1.05rem;
        }
        .option-label {
            display: block;
            padding: 8px 12px;
            margin: 6px 0;
            border-radius: 40px;
            background: #fcf9f5;
            border: 1px solid #ddd0c0;
            cursor: pointer;
            transition: all 0.1s;
        }
        .option-label:hover {
            background: #efe3d6;
        }
        .option-label input {
            margin-right: 10px;
            accent-color: #8b6f50;
        }
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
        }
        .primary-btn {
            background: #6b4e2e;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 60px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            transition: 0.2s;
            border: 1px solid #8b6f50;
            min-width: 120px;
        }
        .primary-btn:disabled {
            background: #b9a28c;
            cursor: not-allowed;
            box-shadow: none;
        }
        .primary-btn:hover:not(:disabled) {
            background: #4f3a22;
            transform: scale(0.98);
        }
        .hidden {
            display: none !important;
        }
        /* 结果区域 */
        .result-area {
            background: #e7dbcd;
            border-radius: 32px;
            padding: 25px 20px;
            margin-top: 30px;
            box-shadow: inset 0 0 0 1px #f3ede6, 0 10px 20px rgba(0,0,0,0.05);
        }
        .result-text {
            text-align: center;
        }
        .dao-name {
            font-size: 3rem;
            font-weight: 500;
            letter-spacing: 8px;
            color: #2b1b0e;
            margin-bottom: 5px;
        }
        .sub-dao {
            font-size: 1.4rem;
            color: #5f4a32;
            margin-bottom: 20px;
            font-weight: 400;
            border-bottom: 1px dashed #b9a28c;
            padding-bottom: 15px;
        }
        .radar-container {
            margin: 20px auto;
            width: 100%;
            max-width: 500px;
            height: auto;
        }
        canvas {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            background: #f1e8de;
            border-radius: 30px;
            padding: 8px;
        }

        /* --- 升级版：结果卡片外层 --- */
        .dao-desc-item {
            text-align: left;
            margin: 15px 0;
            padding: 14px 20px;
            /* 移除了原本的 background 和 border，改用下面的 main/sub 样式包住它 */
            border-radius: 16px; /* 更圆润一些 */
            line-height: 1.6;
            transition: all 0.3s ease; /* 加个淡入淡出动效，更细腻 */
        }

        /* 主修的专属样式：亮底色 + 深色粗边框 */
        .dao-desc-item.is-main {
            background: #fcfaf7; /* 更亮的背景色，突出核心 */
            border-left: 5px solid #8b6f50; /* 深色粗边框，显眼、稳重 */
            box-shadow: 0 4px 15px rgba(139, 111, 80, 0.05); /* 淡淡的投影，更有质感 */
        }

        /* 辅修的专属样式：灰底色 + 浅色细边框 */
        .dao-desc-item.is-sub {
            background: #f3ede6; /* 回归原本温柔的底色 */
            border-left: 5px solid #d8caba; /* 浅色细边框，起到辅助和衬托作用 */
            opacity: 0.95; /* 稍微透明一点，拉开层次 */
        }

        /* --- 新增：主辅修小标签 --- */
        .dao-tag {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 6px;
            margin-right: 8px;
            vertical-align: text-bottom; /* 标签和文字底端对齐 */
            font-weight: 400;
            letter-spacing: 2px; /* 增加字间距，更有禅意 */
        }
        .tag-main {
            background: #6b4e2e; /* 深棕色主色调 */
            color: #f5efe6; /* 亮色文字 */
        }
        .tag-sub {
            background: #d8caba; /* 浅卡其色 */
            color: #6b5843; /* 深色文字 */
        }
        /* 八字真言行的样式 */
        .dao-quote-title {
            font-size: 1.05rem; /* 稍微大一点，突出重点 */
            color: #3e2e1f;
            margin-bottom: 6px; /* 换行并向下留出间距 */
            font-weight: 500;
        }
        /* 强化道名加粗效果 */
        .dao-quote-title strong {
            color: #6b4e2e;
            font-size: 1.15rem;
            margin-right: 4px;
        }
        /* 小字解释文本的样式 */
        .dao-desc-text {
            font-size: 0.9rem; /* 设置为小字 */
            color: #7a624b; /* 颜色调浅一点，拉开层次感 */
            text-align: justify; /* 两端对齐，看起来更整齐 */
            margin-top: 6px;
        }
        .glitch-box {
            font-family: monospace;
            background: #1e1a16;
            color: #b3ffaa;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 4px;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #8f7a64;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <h1>你到底修的什么仙？</h1>
    <div class="sub">五十六问 · 照见本真</div>

    <!-- 分页容器 -->
    <div id="pages-container"></div>
    <div class="page-indicator" id="page-indicator"></div>

    <div class="btn-container">
        <button class="primary-btn" id="prev-btn" disabled>上一页</button>
        <button class="primary-btn" id="next-btn">下一页</button>
        <button class="primary-btn hidden" id="submit-btn">叩问道心</button>
    </div>

    <div id="result-area" class="result-area hidden">
        <div id="result-content"></div>
    </div>

    <footer>
       <div class="footer-copyright">
           ©莹栀满悦 摸鱼
       </div>
       <div class="footer-disclaimer">
           ※ 本测试结果仅供娱乐 请勿当真 ※
       </div>
    </footer>

    <script src="index.js"></script>
</body>
</html>
